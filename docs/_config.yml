title: Smart Contract Wallet + Policy Engine
description: A smart contract wallet with a risk-based policy engine that classifies transactions by risk level and enforces appropriate authorization on-chain.
baseurl: "/smart-wallet-policy-engine"
url: ""

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: dark

aux_links:
  "GitHub":
    - "https://github.com/vaibhavkapur22/smart-wallet-policy-engine"

aux_links_new_tab: true

nav_sort: order

heading_anchors: true

search_enabled: true
search.button: true

back_to_top: true
back_to_top_text: "Back to top"

footer_content: 'Smart Contract Wallet + Policy Engine &mdash; Open Source under MIT License.'

callouts:
  warning:
    title: Warning
    color: yellow
  note:
    title: Note
    color: blue
  important:
    title: Important
    color: red

plugins:
  - jekyll-seo-tag

exclude:
  - node_modules/
  - vendor/
